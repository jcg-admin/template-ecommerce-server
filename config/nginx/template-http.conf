# =============================================================================
# config/nginx/template-http.conf
# VirtualHost HTTP (:80) -- redirige todo a HTTPS
# =============================================================================
#
# TEMPLATE: los placeholders %%VARIABLE%% son reemplazados por
# provisioners/nginx/setup_vhost.sh usando los valores de .env.
#
# Funcion de este virtualhost:
#
#   Redirigir toda peticion HTTP a HTTPS con codigo 301 (permanente),
#   conservando path y query string.
#
#   EXCEPCION: el path /.well-known/acme-challenge/ se sirve en HTTP sin
#   redirigir porque acme.sh lo usa para el ACME HTTP-01 challenge de
#   emision y renovacion del certificado SSL (RFC 8555). Si se
#   redirigiera, la renovacion automatica fallaria.
#
# Diseno vs el referente (Apache):
#
#   Apache:  RewriteEngine + RewriteCond + RewriteRule (3 directivas).
#   Nginx:   return 301 con $host y $request_uri (1 directiva).
#
#   Apache:  Alias + <Directory>.
#   Nginx:   location /.well-known/acme-challenge/ con root.
#
# Path canonico de ACME: /var/www/acme-challenge (dedicado para no
# mezclar con cualquier contenido en /var/www/html/). El directorio lo
# crea provisioners/ssl/setup_ssl.sh con mode 0755 root:root.
#
# Activar:
#
#   sudo bash provisioners/nginx/setup_vhost.sh
# =============================================================================

server {
    listen      80;
    listen      [::]:80;
    server_name %%DOMAIN%%;

    # -------------------------------------------------------------------------
    # ACME HTTP-01 challenge (acme.sh / Let's Encrypt)
    # -------------------------------------------------------------------------
    # acme.sh escribe el token de verificacion en este directorio durante
    # el flujo de emision o renovacion. Nginx lo sirve por HTTP plano (sin
    # redirect) para que Let's Encrypt pueda leerlo y validar el control
    # del dominio. Esta location debe declararse ANTES del catch-all "/"
    # para que Nginx la matchee primero.
    #
    # Path canonico: /var/www/acme-challenge
    # Creacion del directorio: provisioners/ssl/setup_ssl.sh
    # Permisos canonicos: 0755 root:root
    location /.well-known/acme-challenge/ {
        root /var/www/acme-challenge;
        default_type "text/plain";
        try_files $uri =404;
    }

    # -------------------------------------------------------------------------
    # Redirect global HTTP -> HTTPS
    # -------------------------------------------------------------------------
    # Cualquier otra peticion redirige a HTTPS con 301 (permanente),
    # conservando path y query string via $request_uri.
    #
    # $host:         hostname del request (no $server_name; soporta
    #                multiples server_name si la config crece).
    # $request_uri:  path + query string completos.
    location / {
        return 301 https://$host$request_uri;
    }

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    # access_log a un archivo dedicado (no se mezcla con HTTPS access_log
    # ni con el default de Nginx). Util para auditar peticiones HTTP, que
    # idealmente son pocas (solo bots y renovaciones ACME).
    access_log /var/log/nginx/template-http-access.log;
    error_log  /var/log/nginx/template-http-error.log warn;
}
