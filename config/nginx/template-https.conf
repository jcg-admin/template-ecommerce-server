# =============================================================================
# config/nginx/template-https.conf
# VirtualHost HTTPS (:443) -- terminacion SSL + static UI + reverse proxy
# =============================================================================
#
# TEMPLATE: los placeholders %%VARIABLE%% son reemplazados por
# provisioners/nginx/setup_vhost.sh usando los valores de .env.
#
# Cinco responsabilidades:
#
#   1. Terminacion SSL/TLS (cert + key + fullchain de Let's Encrypt o
#      self-signed via acme.sh / openssl).
#   2. Servir el static UI bundle desde $UI_DIST (output de
#      `npm run build` en template-ecommerce-ui).
#   3. SPA catch-all: cualquier ruta sin extension de asset cae a
#      /index.html para que React Router la maneje en cliente.
#   4. Reverse proxy /api/* -> $API_UPSTREAM (backend externo, agnostic
#      a tecnologia segun D-BACKEND-AGNOSTIC).
#   5. Cabeceras HTTP de seguridad: HSTS, X-Frame-Options,
#      X-Content-Type-Options, Referrer-Policy, etc.
#
# Diseno vs el referente Apache (practicayoruba-https.conf):
#
#   - SPA catch-all: el referente requiere una vista `serve_spa` en
#     Django + re_path en urls.py + variable UI_DIST en settings. Aqui
#     Nginx lo hace en 1 linea: `try_files $uri $uri/ /index.html`.
#   - WSGI: eliminado completamente (D-WS + D-BACKEND-AGNOSTIC).
#   - mod_headers: Nginx tiene `add_header` directo (sin condicional
#     <IfModule mod_headers.c> porque siempre esta activo).
#   - <Directory> blocks: eliminados (Nginx no los necesita; `root` +
#     `try_files` cubren el caso).
#
# Orden de location blocks (Nginx matchea en orden de declaracion para
# prefix locations no-exact, regex se evaluan despues):
#
#   1. /.well-known/acme-challenge/  (excepcion ACME, prefix ^~)
#   2. /api/                          (reverse proxy, prefix ^~)
#   3. ~* \.(extensiones)$            (assets con cache largo, regex)
#   4. /                              (SPA catch-all, prefix)
#
# Activar:
#
#   sudo bash provisioners/nginx/setup_vhost.sh
# =============================================================================


server {
    # -------------------------------------------------------------------------
    # Listen y SSL
    # -------------------------------------------------------------------------
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name %%DOMAIN%%;

    # Ruta raiz: el static UI bundle. `try_files` de cada location lo usa
    # como base para resolver paths. F11 valida que este directorio existe
    # y es legible por www-data.
    root  %%UI_DIST%%;
    index index.html;

    # Ocultar version de Nginx en headers y paginas de error.
    server_tokens off;

    # -------------------------------------------------------------------------
    # Certificados Let's Encrypt (via acme.sh) o self-signed (dev)
    # -------------------------------------------------------------------------
    # Path canonico (D-STORAGE): %%SSL_CERT_DIR%%/
    #   cert.pem        0644 root:root  (publico)
    #   fullchain.pem   0644 root:root  (publico, cadena completa)
    #   key.pem         0600 root:root  (PRIVADO; Nginx master root lo
    #                                   lee antes de drop a www-data)
    ssl_certificate         %%SSL_CERT_DIR%%/fullchain.pem;
    ssl_certificate_key     %%SSL_CERT_DIR%%/key.pem;
    ssl_trusted_certificate %%SSL_CERT_DIR%%/fullchain.pem;

    # Protocolos modernos unicamente (TLS 1.2+).
    # SSLv2, SSLv3, TLS 1.0, TLS 1.1 deshabilitados por defecto en Nginx
    # 1.24+; declarado explicitamente para mayor claridad y auditoria.
    ssl_protocols TLSv1.2 TLSv1.3;

    # Cipher suites Mozilla intermediate (compatible con clients 2018+).
    # ECDHE para forward secrecy. AES-GCM y CHACHA20 para autenticacion
    # de cifrado.
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Session cache: clients que reconectan no rehacen handshake completo.
    # 10 MB ~ 40000 sesiones. Timeout 1 dia.
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Session tickets off: forward secrecy mas estricta. Mas overhead pero
    # mejor postura de seguridad para un server publico.
    ssl_session_tickets off;

    # OCSP stapling (recomendado, comentado porque requiere decidir el
    # resolver DNS a usar). Para activar, descomentar y configurar
    # `resolver` con un DNS publico (1.1.1.1, 8.8.8.8) o interno.
    #
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # resolver 1.1.1.1 8.8.8.8 valid=300s;
    # resolver_timeout 5s;

    # -------------------------------------------------------------------------
    # Headers de seguridad
    # -------------------------------------------------------------------------
    # `always` asegura que se anaden tambien en respuestas de error (4xx,
    # 5xx). Sin `always`, Nginx solo los anade en 200/201/204/206/301/
    # 302/303/304/307/308.

    # HSTS: el browser solo usara HTTPS para este dominio durante 1 año.
    # includeSubDomains se aplica a subdominios; preload permite registrar
    # el dominio en la HSTS preload list (https://hstspreload.org/).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Evitar que la app sea embebida en iframes de otros dominios.
    add_header X-Frame-Options "DENY" always;

    # Prevenir MIME-type sniffing.
    add_header X-Content-Type-Options "nosniff" always;

    # Politica de referrer conservadora: no enviar referrer a downgrades
    # HTTP, enviar solo origen a cross-origin.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # XSS legacy protection. Modern browsers ignoran esto en favor de CSP,
    # pero no danya y ayuda en browsers viejos.
    add_header X-XSS-Protection "1; mode=block" always;

    # Permissions-Policy: deshabilitar APIs sensibles que el UI no usa.
    # Ajustar segun necesidades del UI. Comentado por defecto porque
    # depende del UI especifico.
    # add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Content-Security-Policy: control de origenes permitidos. DEPENDE
    # del UI especifico (CDNs de fonts, scripts externos, imagenes, etc.)
    # y rompe rapido si esta mal configurado. Comentado por defecto;
    # el operador la activa cuando conozca el UI final.
    #
    # Ejemplo restrictivo (solo self):
    # add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self';" always;

    # -------------------------------------------------------------------------
    # Compresion (gzip)
    # -------------------------------------------------------------------------
    # Activo solo para tipos comunes (text, JS, CSS, JSON, SVG). NO para
    # imagenes ya comprimidas (PNG, JPG, WebP) ni para fuentes (woff2 ya
    # esta comprimida internamente).
    # Brotli no se activa (requiere modulo externo; gzip cubre la mayoria
    # de los casos).
    gzip                on;
    gzip_vary           on;
    gzip_min_length     1024;
    gzip_comp_level     6;
    gzip_proxied        any;
    gzip_types          text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # -------------------------------------------------------------------------
    # ACME HTTP-01 (por si renovacion trigger desde HTTPS)
    # -------------------------------------------------------------------------
    # Aunque el flujo ACME canonico va por HTTP (puerto 80), declarar la
    # excepcion aqui no danya y permite renovaciones forzadas via HTTPS
    # en escenarios de transicion. Mismo path que el vhost HTTP.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/acme-challenge;
        default_type "text/plain";
        try_files $uri =404;
    }

    # -------------------------------------------------------------------------
    # Reverse proxy /api/* -> backend externo
    # -------------------------------------------------------------------------
    # %%API_UPSTREAM%% es la URL del backend (vacio por defecto en .env;
    # si esta vacio, setup_vhost.sh COMENTARA este bloque entero al
    # generar la config final, asi /api/* devuelve 502 hasta que el
    # operador configure un backend).
    #
    # Formatos validos para %%API_UPSTREAM%% (D-BACKEND-AGNOSTIC):
    #   http://127.0.0.1:8000        Django/Node dev en local
    #   http://api-internal:80       Microservicio Docker
    #   unix:/run/gunicorn.sock      Socket Unix (Django produccion)
    #   https://api.midominio.com    Backend en otro host
    #
    # Decision: usar proxy_pass con reemplazo literal del placeholder
    # (no variable Nginx) para que Nginx resuelva el upstream una vez al
    # arrancar, sin requerir `resolver` configurado para DNS runtime.
    location ^~ /api/ {
        proxy_pass         %%API_UPSTREAM%%;
        proxy_http_version 1.1;

        # Headers requeridos por backends comunes
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket support (si el backend lo usa, no danya si no)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts razonables; aumentar si el backend tiene endpoints
        # lentos legitimos (uploads grandes, long-polling, etc.)
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer de respuesta. Util si el backend genera respuestas
        # grandes que Nginx puede bufferizar para no bloquear al worker.
        proxy_buffering on;
        proxy_buffers   8 16k;
        proxy_buffer_size       16k;
    }

    # -------------------------------------------------------------------------
    # Static assets con cache largo (chunks de webpack con hash)
    # -------------------------------------------------------------------------
    # Webpack emite archivos con hash en el nombre (e.g. main.abc123.js).
    # Cualquier cambio en el contenido cambia el hash, asi que un cache
    # de 1 año es seguro (immutable).
    #
    # Extensiones cubiertas:
    #   - JS/MJS/MAP   bundles + source maps
    #   - CSS          hojas de estilo
    #   - WOFF/WOFF2   fuentes
    #   - SVG          iconos y assets vectoriales
    #   - PNG/JPG/JPEG/GIF/WebP/ICO  imagenes
    #   - JSON         manifest, locales (a veces con hash)
    #   - TXT          robots.txt, humans.txt
    location ~* \.(js|mjs|css|map|woff2?|svg|ico|png|jpe?g|gif|webp|json|txt)$ {
        expires    1y;
        add_header Cache-Control "public, immutable" always;

        # Mantener los headers de seguridad globales (Nginx no los hereda
        # automaticamente dentro de un location regex). El truco:
        # `add_header` se hereda SOLO si el location NO declara propios
        # add_header. Como aqui declaramos Cache-Control, hay que
        # re-declarar los otros explicitamente.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options          "DENY" always;
        add_header X-Content-Type-Options   "nosniff" always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

        # try_files: servir el archivo o 404. NO caer al catch-all,
        # porque si un asset con hash no existe es un bug del build, no
        # debe servirse index.html (que romperia el browser intentando
        # ejecutar HTML como JS).
        try_files $uri =404;
    }

    # -------------------------------------------------------------------------
    # SPA catch-all
    # -------------------------------------------------------------------------
    # CUALQUIER ruta que no haya matcheado los locations anteriores cae
    # aqui. Si el path corresponde a un archivo real (raro tras los
    # locations anteriores), se sirve. Si no, se sirve /index.html para
    # que React Router (en el browser) tome control y muestre la ruta
    # correcta.
    #
    # Esta es la magia del SPA en Nginx: 1 directiva (`try_files`) vs
    # toda la vista `serve_spa` en Django del referente.
    location / {
        try_files $uri $uri/ /index.html;

        # No cache en index.html para que el navegador siempre traiga la
        # version mas reciente (los assets con hash se cachean fuerte
        # arriba, asi que el index.html nuevo apunta a los chunks
        # correctos).
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma         "no-cache" always;
        add_header Expires        "0" always;

        # Re-declarar headers de seguridad (mismo motivo que en el bloque
        # de assets: Nginx no hereda add_header si el location declara
        # propios add_header).
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options          "DENY" always;
        add_header X-Content-Type-Options   "nosniff" always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    }

    # -------------------------------------------------------------------------
    # Bloqueo de paths sensibles (proteccion adicional)
    # -------------------------------------------------------------------------
    # Aunque fail2ban (jail nginx-botsearch) banea IPs que prueban estos
    # paths repetidamente, devolver 404 inmediato en lugar de servir
    # /index.html ahorra trabajo a los workers y log noise.
    location ~ ^/(\.git|\.env|\.htaccess|\.htpasswd|wp-admin|wp-login\.php|phpmyadmin|xmlrpc\.php) {
        deny all;
        access_log off;
        return 404;
    }

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    access_log /var/log/nginx/template-https-access.log;
    error_log  /var/log/nginx/template-https-error.log warn;

    # -------------------------------------------------------------------------
    # Limites de cuerpo
    # -------------------------------------------------------------------------
    # Tamano maximo de body que Nginx acepta antes de devolver 413. El
    # default de Nginx (1 MB) es muy bajo para uploads. Ajustar segun
    # los endpoints del backend.
    client_max_body_size 10m;
}
